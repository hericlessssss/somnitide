# Test application properties
# These values are OVERRIDDEN at runtime by @DynamicPropertySource in IT classes
# (Testcontainers injects the real container URL, username, and password)
# They just need to be valid enough that Spring context starts without errors.

spring.datasource.url=jdbc:postgresql://localhost:5432/somnitide_test_placeholder
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.dev.somnitide=DEBUG
logging.level.org.flywaydb=INFO
