spring.application.name=somnitide

# Server
server.port=8080

# Datasource — set via environment variables (see .env / .env.exemple)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Supabase JWKS endpoint for JWT validation (ETAPA 3)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI}

# Logging
logging.level.dev.somnitide=DEBUG
logging.level.org.springframework.security=INFO
logging.level.dev.somnitide=DEBUG
logging.level.org.flywaydb=INFO
