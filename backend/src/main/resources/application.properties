spring.application.name=somnitide

# Server
server.port=8080

# Datasource — configured via environment variables (ETAPA 2)
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.username=${DATABASE_USERNAME}
# spring.datasource.password=${DATABASE_PASSWORD}

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# Flyway — migrations in src/main/resources/db/migration (ETAPA 2)
# spring.flyway.enabled=true

# Disable Flyway and datasource auto-config in this bootstrap phase
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Supabase JWKS endpoint for JWT validation (ETAPA 3)
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI}

# Disable security auto-config in bootstrap phase (ETAPA 3 will enable it)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

# Logging
logging.level.dev.somnitide=DEBUG
